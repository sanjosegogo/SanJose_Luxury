<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖荷西好物購🇺🇸 - 全球精品代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fdf8f5;
        }

        .flower-bg {
            background-image: radial-gradient(#ffe4e6 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .product-card {
            transition: transform 0.2s;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .img-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .img-slider::-webkit-scrollbar { display: none; }

        .img-slider img {
            flex: 0 0 100%;
            scroll-snap-align: start;
            object-fit: cover;
            aspect-ratio: 1/1;
            background-color: #f3f4f6;
            cursor: pointer;
        }

        .brand-badge {
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #d946ef;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .sale-tag {
            background: linear-gradient(45deg, #f43f5e, #fb7185);
            color: white;
            padding: 4px 12px;
            border-radius: 0 0 15px 0;
            font-size: 0.8rem;
            font-weight: 800;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .video-hint {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            color: white;
            padding: 5px 12px;
            border-radius: 100px; 
            font-size: 0.75rem;
            font-weight: 500;
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 20;
            display: flex;
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
        }

        .brand-btn-active {
            background-color: #ec4899 !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            border-color: #ec4899 !important;
            box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.3) !important;
        }

        .sale-filter-btn {
            background-color: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
        }
    </style>
</head>
<body class="flower-bg">

    <div id="marquee-container" class="bg-pink-500 text-white py-2 overflow-hidden hidden shadow-sm">
        <div class="marquee-content text-sm font-bold" id="marquee-text"></div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-pink-100">
        <div class="max-w-screen-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🦋</span>
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold text-gray-800 leading-none">聖荷西好物購🇺🇸</h1>
                    <span class="text-[10px] text-pink-400 font-medium tracking-widest uppercase">San Jose Goodies</span>
                </div>
            </div>
            <a href="https://www.facebook.com/groups/183038802197503" target="_blank" class="bg-pink-500 text-white px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-1 shadow-md shadow-pink-200 active:scale-95 transition-transform">
                <i class="fab fa-facebook"></i> 加入社團
            </a>
        </div>
    </header>

    <div class="max-w-screen-md mx-auto px-4 mt-6">
        <div id="brand-filter" class="flex flex-wrap gap-2 pb-2">
            <button onclick="filterBySale()" id="btn-sale" class="brand-btn sale-filter-btn px-4 py-1.5 rounded-full text-xs font-bold shadow-sm transition-all hidden">🔥 限時特賣</button>
            <button onclick="filterByBrand('all')" id="btn-all" class="brand-btn brand-btn-active px-4 py-1.5 rounded-full border border-pink-100 text-xs shadow-sm transition-all">所有商品</button>
        </div>
    </div>

    <main class="max-w-screen-md mx-auto px-4 py-4">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div id="loading-state" class="col-span-full text-center py-24 text-gray-400">
                <div class="animate-bounce mb-4 text-4xl">🌸</div>
                <p class="text-sm font-medium tracking-widest">正在為你同步全球最新好物...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 bg-white/50 mt-10 text-gray-400 text-xs leading-relaxed border-t border-pink-50">
        <div class="mb-4 text-pink-200 text-xl">✨ ✨ ✨</div>
        <p class="font-bold text-gray-600 text-sm mb-1">聖荷西好物購🇺🇸</p>
        <p class="mb-4">精品代購・嚴選品質・100% 正品保障</p>
        <div class="bg-white mx-auto max-w-xs p-4 rounded-2xl shadow-sm border border-pink-50 text-gray-500 mb-6 transition-all hover:border-pink-200">
            <a href="https://www.google.com/maps/search/?api=1&query=台北市長春路380號1樓" target="_blank" class="block group">
                <p class="font-bold mb-1 text-pink-500 group-hover:text-pink-600"><i class="fas fa-map-marker-alt mr-1"></i> 長春路總店</p>
                <p class="group-hover:text-gray-700">台北市長春路380號1樓</p>
                <p class="text-[9px] text-pink-300 mt-1 italic">點擊開啟地圖</p>
            </a>
        </div>
        <div class="max-w-md mx-auto px-6 text-[10px] text-gray-400 opacity-70 leading-normal space-y-1">
            <p>※ 本網頁所載產品圖示及影音僅供導覽參考，實際到貨細節將依原廠或採購專櫃實物為準。</p>
            <p>※ 若本網頁相關圖文內容有任何權利疑義，敬請透過私訊與我們聯繫，我們將立即協助處理。</p>
        </div>
    </footer>

    <script>
        /**
         * Core Internal Config
         */
        const _0x4a2c = [104, 116, 116, 112, 115, 58, 47, 47, 100, 111, 99, 115, 46, 103, 111, 111, 103, 108, 101, 46, 99, 111, 109, 47, 115, 112, 114, 101, 97, 100, 115, 104, 101, 101, 116, 115, 47, 100, 47, 101, 47];
        const _0x91ef = "2PACX-1vQw6SB2ardXjIr4Sh0IhT8hnKkpUVeKDJiq-OI22riSHc8CX00K-f76fVUpyMjSNYynP06Pfhp40GJ9";
        const _0x1c8b = "/pub?gid=";
        const _0x55d1 = "&single=true&output=csv";

        function _0x3e12(_0xaf1) {
            const _0xb12 = _0x4a2c.map(_0x22 => String.fromCharCode(_0x22)).join('');
            return _0xb12 + _0x91ef + _0x1c8b + _0xaf1 + _0x55d1;
        }

        const _DS_0 = _0x3e12("0");
        const _DS_M = _0x3e12("664591331");
        const _FB_URL = 'https://www.facebook.com/groups/183038802197503/';

        let allProducts = [];

        function formatPrice(val) {
            if (!val || val === '0' || val === '') return null;
            const num = parseInt(val.toString().replace(/[^\d]/g, ''), 10);
            if (isNaN(num)) return null;
            return 'NT$ ' + num.toLocaleString();
        }

        function parseDiscountValue(val) {
            if (!val || val === '0' || val === '0.00%' || val === '0%') return 999;
            let num = parseFloat(val.toString().replace('%', ''));
            if (isNaN(num) || num === 0) return 999;
            if (num < 1) num = num * 100;
            return num;
        }

        function formatDiscountText(val) {
            const num = parseDiscountValue(val);
            if (num === 999) return null;
            return Math.floor(num) + '折';
        }

        function parseGenericCSV(csvText) {
            const lines = [];
            let currentLine = [];
            let currentField = '';
            let inQuotes = false;
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { currentField += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { currentLine.push(currentField); currentField = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') i++;
                        currentLine.push(currentField);
                        lines.push(currentLine);
                        currentLine = [];
                        currentField = '';
                    } else { currentField += char; }
                }
            }
            if (currentLine.length > 0 || currentField !== '') { currentLine.push(currentField); lines.push(currentLine); }
            return lines;
        }

        async function init() {
            try {
                const timestamp = Date.now();
                
                try {
                    const mRes = await fetch(`${_DS_M}&t=${timestamp}`);
                    if (mRes.ok) {
                        const mText = await mRes.text();
                        const mRows = parseGenericCSV(mText);
                        const msgs = mRows.map(r => r[0]?.trim()).filter(m => m);
                        if (msgs.length > 0) {
                            document.getElementById('marquee-text').innerText = `🌸 ${msgs.join('　✨　')} 🌸`;
                            document.getElementById('marquee-container').classList.remove('hidden');
                        }
                    }
                } catch(e) {}

                const response = await fetch(`${_DS_0}&t=${timestamp}`);
                if (!response.ok) throw new Error("Internal Service Error");
                
                const csvText = await response.text();
                const rows = parseGenericCSV(csvText);
                
                allProducts = [];
                for(let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[4]) continue; 
                    if (row[1]?.trim().toUpperCase() !== 'TRUE') continue; 

                    const item = {
                        id: row[0]?.trim(),
                        isSale: row[2]?.trim() !== '',
                        saleLabel: row[2]?.trim(),
                        discountVal: parseDiscountValue(row[3]),
                        discount: formatDiscountText(row[3]),
                        name: row[4]?.trim(),
                        marketPrice: formatPrice(row[5]),
                        salePrice: formatPrice(row[6]),
                        specialPrice: formatPrice(row[7]),
                        size: row[8]?.trim(),
                        brand: row[9]?.trim() || '其他',
                        postUrl: row[10]?.trim(),
                        images: []
                    };
                    
                    for (let j = 11; j < row.length; j++) {
                        const url = row[j]?.trim();
                        if (url && (url.startsWith('http'))) item.images.push(url);
                    }
                    allProducts.push(item);
                }

                allProducts.sort((a, b) => {
                    if (a.isSale && !b.isSale) return -1;
                    if (!a.isSale && b.isSale) return 1;
                    if (a.isSale && b.isSale) return a.discountVal - b.discountVal;
                    return 0;
                });

                if (allProducts.some(p => p.isSale)) document.getElementById('btn-sale').classList.remove('hidden');
                updateBrandFilters(allProducts);
                renderProducts(allProducts);
            } catch (error) { 
                document.getElementById('product-container').innerHTML = `<div class="col-span-full text-center py-24 text-gray-400">系統服務同步中，請稍候。</div>`;
            }
        }

        function updateBrandFilters(products) {
            const container = document.getElementById('brand-filter');
            const brands = [...new Set(products.map(p => p.brand))].filter(b => b !== '其他').sort();
            brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'brand-btn bg-white px-4 py-1.5 rounded-full border border-pink-50 text-xs text-gray-500 shadow-sm transition-all';
                btn.innerText = brand;
                btn.onclick = () => filterByBrand(brand, btn);
                container.appendChild(btn);
            });
        }

        function filterBySale() {
            document.querySelectorAll('.brand-btn').forEach(b => {
                b.classList.remove('brand-btn-active');
                if (!b.classList.contains('sale-filter-btn')) b.classList.add('bg-white', 'text-gray-500');
            });
            document.getElementById('btn-sale').classList.add('brand-btn-active');
            renderProducts(allProducts.filter(p => p.isSale));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterByBrand(brand, btn) {
            document.querySelectorAll('.brand-btn').forEach(b => {
                b.classList.remove('brand-btn-active');
                b.classList.add('bg-white', 'text-gray-500');
            });
            if (btn) {
                btn.classList.remove('bg-white', 'text-gray-500');
                btn.classList.add('brand-btn-active');
            } else {
                document.getElementById('btn-all').classList.add('brand-btn-active');
            }
            const filtered = brand === 'all' ? allProducts : allProducts.filter(p => p.brand === brand);
            renderProducts(filtered);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = products.length === 0 ? `<div class="col-span-full text-center py-20 text-gray-400 text-sm">搜尋範圍內暫無商品。</div>` : '';

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                const finalPrice = p.specialPrice || p.salePrice;
                const targetLink = (p.postUrl && p.postUrl !== '') ? p.postUrl : _FB_URL;
                const hasVideo = p.postUrl && p.postUrl !== '';

                const imagesHTML = p.images.length > 0 
                    ? p.images.map(img => `<img src="${img}" onclick="window.open('${targetLink}', '_blank')" onerror="this.src='https://via.placeholder.com/400?text=圖片載入中'">`).join('')
                    : `<img src="https://via.placeholder.com/400?text=聖荷西好物購" onclick="window.open('${targetLink}', '_blank')">`;

                card.innerHTML = `
                    ${p.isSale ? `<div class="sale-tag">🔥 ${p.saleLabel} ${p.discount ? `· ${p.discount}` : ''}</div>` : ''}
                    <div class="relative">
                        <div class="img-slider">${imagesHTML}</div>
                        <div class="absolute top-3 right-3"><span class="brand-badge">${p.brand}</span></div>
                        ${hasVideo ? `<div class="video-hint"><i class="fas fa-play-circle"></i><span>點圖看實拍影音</span></div>` : ''}
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg mb-1 leading-tight">${p.name}</h3>
                            <div class="mb-3"><span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded">SIZE: ${p.size || 'F'}</span></div>
                        </div>
                        <div class="mt-auto">
                            <div class="flex flex-col mb-3">
                                <span class="text-gray-400 text-xs line-through">專櫃價 ${p.marketPrice || '---'}</span>
                                <div class="flex items-baseline gap-2">
                                    <span class="${p.isSale ? 'text-red-500' : 'text-pink-600'} font-extrabold text-2xl">${finalPrice}</span>
                                    ${p.isSale && p.discount ? `<span class="text-red-500 text-xs font-bold bg-red-50 px-1.5 rounded border border-red-100">${p.discount}</span>` : ''}
                                </div>
                            </div>
                            <button onclick="window.open('${targetLink}', '_blank')" class="w-full ${p.isSale ? 'bg-red-500' : 'bg-pink-500'} text-white py-2.5 rounded-full text-sm font-bold shadow-md active:scale-95 transition-all">
                                立即私訊購買
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        init();
    </script>
</body>
</html>
